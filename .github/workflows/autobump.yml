name: Bump formulae on schedule or request

on:
  push:
    branches:
      - main
      - master
    paths:
      - .github/workflows/autobump.yml
  workflow_dispatch:
    inputs:
      formulae:
        description: Custom list of formulae to livecheck and bump if outdated
        required: false
  schedule:
    - cron: "15 * * * *"

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_NO_ANALYTICS: 1

defaults:
  run:
    shell: bash -xeuo pipefail {0}

jobs:
  autobump:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/homebrew/brew:main
    steps:
    - name: Set up Homebrew
      id: set-up-homebrew
      uses: Homebrew/actions/setup-homebrew@main
      with:
        cask: false
        core: false
        stable: false
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up git
      uses: Homebrew/actions/git-user-config@main
      with:
        username: ${{ (github.event_name == 'workflow_dispatch' && github.actor) || 'BrewTestBot' }}

    - name: Bump formulae
      id: autobump-formulae
      continue-on-error: true
      env:
        HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.AUTOBUMP_TOKEN }}
        HOMEBREW_TEST_BOT_AUTOBUMP: 1
        HOMEBREW_GIT_COMMITTER_NAME: BrewTestBot
        HOMEBREW_GIT_COMMITTER_EMAIL: 1589480+BrewTestBot@users.noreply.github.com
        FORMULAE: ${{ inputs.formulae }}
      run: |
        BREW_BUMP=(brew bump --debug --no-fork --open-pr --full-name --formulae --bump-synced)
        if [[ -n "${FORMULAE-}" ]]; then
          xargs -t "${BREW_BUMP[@]}" <<<"${FORMULAE}"
        else
          "${BREW_BUMP[@]}" --tap="${GITHUB_REPOSITORY}"
        fi
